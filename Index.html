<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            height: 100%;
            background: #000;
            overflow: hidden;
            touch-action: manipulation;
        }
        .video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .fallback {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 10;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="rick-video" autoplay loop playsinline muted>
            <source src="https://github.com/kubobeem/Damasareta/raw/refs/heads/main/YTDown_YouTube_Rick-Astley-Never-Gonna-Give-You-Up-Offi_Media_dQw4w9WgXcQ_006_144p.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- ブラウザ制限回避用クリックフォールバック -->
    <div class="fallback" id="fallback" onclick="playVideo()">
        タップして再生
    </div>

    <script>
        const video = document.getElementById('rick-video');
        const fallback = document.getElementById('fallback');

        // 開いた瞬間に自動再生を試みる
        function tryAutoplay() {
            video.muted = true; // 最初はミュートで自動再生を試す（ブラウザ制限回避）
            video.play().catch(() => {
                // 自動再生失敗したらクリック促す
                fallback.style.display = 'flex';
            });
        }

        // クリックで強制再生（音あり）
        function playVideo() {
            fallback.style.display = 'none';
            video.muted = false;
            video.play();
        }

        // ページ読み込み時に即実行
        window.onload = tryAutoplay;

        // ユーザー操作があれば即再生
        document.addEventListener('click', () => {
            if (video.paused) playVideo();
        }, { once: true });
    </script>
</body>
</html>
